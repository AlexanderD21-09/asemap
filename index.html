<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - ARS ASEMAP</title>
    <link rel="stylesheet" href="autorizaciones.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="background-image">
            <div class="hero-text">
                <h1>ARS ASEMAP</h1>
                <p>"Sistema Autorizaciones Web Para Prestadores Servicios Salud"</p>
            </div>
        </div>

        <div class="floating-box">
            <div class="logo-area">
                <img src="imagenes/asemaplogo.png" alt="ARS ASEMAP" class="logo">
            </div>

            <div class="form-header">
                <h2>Acceso de Usuario</h2>
                <p>Ingrese sus credenciales para acceder al sistema.</p>
            </div>

            <form class="login-form">
                <div class="input-group">
                    <label>Dirección de correo electrónico</label>
                    <input type="email" placeholder="correo electrónico" required>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label>Contraseña</label>
                        <a href="#" class="forgot">¿Perdiste tu clave?</a>
                    </div>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="form-footer">
                    <label class="remember">
                        <input type="checkbox"> Recuérdame
                    </label>
                </div>

                <button type="submit" class="btn-access">Acceder al Sistema</button>
            </form>

            <a href="formulario-registro.html" class="registro">Registrate</a>

            <p class="copyright">© 2026 ARS ASEMAP - Todos los derechos reservados.</p>
        </div>
    </div>

</body>
</html>
